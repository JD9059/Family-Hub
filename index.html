<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

    <!-- Header -->
    <header class="mb-8 text-center md:text-left">
        <h1 class="text-3xl font-bold tracking-tight text-white">Our Current Family Hub</h1>
        <p class="text-slate-400">Smart Groceries & Miller Beach Packing Planner</p>
    </header>

    <!-- Main Grid Layout (Symmetrical 50/50 Split on Large Screens) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- LEFT PANEL: Smart Grocery List (Spans 6 columns) -->
        <div class="flex flex-col gap-2">
            <div>
                <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
                    🛒 Smart Grocery List
                </h2>
                
        <!-- LEFT PANEL -->
        <div class="flex gap-2">
            <input type="text" id="grocery-input" 
                   placeholder="Add item (e.g., Milk, Apples, Bread)..." 
                   class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="grocery-add-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-4 py-2.5 rounded-xl transition-colors">
                Add
            </button>
        </div>
                
                <!-- DYNAMIC AI CONTAINER (Replaces all old category divs) -->
                <div id="grocery-items-container" class="space-y-4 overflow-y-auto max-h-[500px]"></div>
           
                <!-- Clear Button -->
                <div class="mt-4 pt-4 border-t border-slate-700">
                    <button onclick="window.clearCheckedGroceries()" class="text-xs text-slate-400 hover:text-rose-400 transition-colors">
                        Clear Checked Items
                    </button>
                </div>
            </div>
        </div>
        <!-- RIGHT PANEL: Miller Beach Trip (Spans 6 columns) -->
        <div class="flex flex-col gap-2">
            <div>
                <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
                    🛒 Miller Beach Trip
                </h2>
        <!-- RIGHT PANEL -->
        <div class="flex gap-2">
            <input type="text" id="beach-input" 
                   placeholder="Add item (e.g., Towels, Cola's treats)..." 
                   class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="beach-add-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-4 py-2.5 rounded-xl transition-colors">
                Add
            </button>
        </div>

                <!-- DYNAMIC AI CONTAINER (Replaces all old category divs) -->
                <div id="beach-items-container" class="space-y-4 overflow-y-auto max-h-[500px]"></div>

                <!-- Clear Button -->
                <div class="mt-4 pt-4 border-t border-slate-700">
                    <button onclick="window.clearCheckedBeachItems()" class="text-xs text-slate-400 hover:text-rose-400 transition-colors">
                        Clear Checked Items
                    </button>
                </div>
            </div>
        </div>

    <!-- Firebase System Module Script -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
          apiKey: "AIzaSyDhXXDOIpSLhZj6l6lNOYI5x1TEs6HA5fw",
          authDomain: "family-hub-7d2b2.firebaseapp.com",
          databaseURL: "https://family-hub-7d2b2-default-rtdb.firebaseio.com",
          projectId: "family-hub-7d2b2",
          storageBucket: "family-hub-7d2b2.firebasestorage.app",
          messagingSenderId: "528172577034",
          appId: "1:528172577034:web:ca48f878d8ed0dc2854af3"
        };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const groceryRef = ref(db, 'groceries');
    const beachRef = ref(db, 'beachItems');

    let globalGroceries = [];
    let globalBeachItems = [];

    // --- DEFINE WINDOW FUNCTIONS FIRST ---
    window.addGroceryItem = async function() {
        const input = document.getElementById('grocery-input');
        if (!input) return;
        const itemText = input.value.trim();
        if (!itemText) return;

        input.value = 'AI sorting...';
        input.disabled = true;

        try {
            const res = await fetch('/api/categorize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ itemText: itemText, listType: 'grocery' })
            });

            const data = await res.json();
            
            if (data.items && Array.isArray(data.items) && data.items.length) {
                data.items.forEach(item => {
                    globalGroceries.push({ 
                        text: item.text, 
                        category: item.category || '🥦 Produce', 
                        checked: false 
                    });
                });
            } else {
                globalGroceries.push({ text: itemText, category: '📦 General', checked: false });
            }
            set(groceryRef, globalGroceries);
        } catch (err) {
            console.error('API Error, saving locally:', err);
            globalGroceries.push({ text: itemText, category: '📦 General', checked: false });
            set(groceryRef, globalGroceries);
        } finally {
            input.value = '';
            input.disabled = false;
            input.focus();
        }
    };

    window.addBeachItem = async function() {
        const input = document.getElementById('beach-input');
        if (!input) return;
        const itemText = input.value.trim();
        if (!itemText) return;

        input.value = 'AI sorting...';
        input.disabled = true;

        try {
            const res = await fetch('/api/categorize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ itemText: itemText, listType: 'beach' })
            });

            const data = await res.json();
            
            if (data.items && Array.isArray(data.items) && data.items.length) {
                data.items.forEach(item => {
                    globalBeachItems.push({ 
                        text: item.text, 
                        category: item.category || '🕶️ Beach Gear', 
                        checked: false 
                    });
                });
            } else {
                globalBeachItems.push({ text: itemText, category: '📦 General', checked: false });
            }
            set(beachRef, globalBeachItems);
        } catch (err) {
            console.error('API Error, saving locally:', err);
            globalBeachItems.push({ text: itemText, category: '📦 General', checked: false });
            set(beachRef, globalBeachItems);
        } finally {
            input.value = '';
            input.disabled = false;
            input.focus();
        }
    };

    window.clearCheckedGroceries = function() {
        globalGroceries = globalGroceries.filter(item => !item.checked);
        set(groceryRef, globalGroceries); 
    };

    window.clearCheckedBeachItems = function() {
        globalBeachItems = globalBeachItems.filter(item => !item.checked);
        set(beachRef, globalBeachItems); 
    };

    // --- REALTIME LISTENERS & RENDERING ---
    onValue(groceryRef, (snapshot) => {
        globalGroceries = snapshot.val() || [];
        renderDynamicList(globalGroceries, 'grocery-items-container', groceryRef);
    });

    onValue(beachRef, (snapshot) => {
        globalBeachItems = snapshot.val() || [];
        renderDynamicList(globalBeachItems, 'beach-items-container', beachRef);
    });

    function renderDynamicList(itemsArray, containerId, firebaseRef) {
        const container = document.getElementById(containerId);
        if (!container) return;

        container.innerHTML = '';

        if (!itemsArray || itemsArray.length === 0) {
            container.innerHTML = `<p class="text-slate-500 text-sm italic">No items on the list.</p>`;
            return;
        }

        const grouped = itemsArray.reduce((acc, item, index) => {
            const cat = item.category || "📦 General";
            if (!acc[cat]) acc[cat] = [];
            acc[cat].push({ ...item, originalIndex: index });
            return acc;
        }, {});

        Object.keys(grouped).forEach(categoryName => {
            const categoryGroup = document.createElement('div');
            categoryGroup.className = 'space-y-1 mb-3';

            const header = document.createElement('h3');
            header.className = 'text-xs font-semibold text-sky-400 uppercase tracking-wider mb-2 mt-3';
            header.textContent = categoryName;
            categoryGroup.appendChild(header);

            grouped[categoryName].forEach(item => {
                const itemRow = document.createElement('label');
                itemRow.className = 'flex items-center gap-3 py-1.5 px-2 hover:bg-slate-750 rounded-lg cursor-pointer transition-colors group';
                
                itemRow.innerHTML = `
                    <input type="checkbox" ${item.checked ? 'checked' : ''} class="w-4 h-4 rounded border-slate-600 bg-slate-700 text-blue-600 focus:ring-blue-500 focus:ring-offset-slate-800">
                    <span class="text-sm ${item.checked ? 'line-through text-slate-500' : 'text-slate-300'} group-hover:text-white transition-colors">${item.text}</span>
                `;

                itemRow.querySelector('input').addEventListener('change', (e) => {
                    itemsArray[item.originalIndex].checked = e.target.checked;
                    set(firebaseRef, itemsArray); 
                });

                categoryGroup.appendChild(itemRow);
            });

            container.appendChild(categoryGroup);
        });
    }
    // ----------------- EVENT LISTENERS -----------------
    const groceryInput = document.getElementById('grocery-input');
    const groceryBtn = document.getElementById('grocery-add-btn');
    const beachInput = document.getElementById('beach-input');
    const beachBtn = document.getElementById('beach-add-btn');

    // Grocery listeners
    if (groceryBtn) groceryBtn.addEventListener('click', window.addGroceryItem);
    if (groceryInput) {
        groceryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') window.addGroceryItem();
        });
    }

    // Beach listeners
    if (beachBtn) beachBtn.addEventListener('click', window.addBeachItem);
    if (beachInput) {
        beachInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') window.addBeachItem();
        });
    }
</script>
<body>
</html>
