<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub Dashboard</title>
    <!-- Tailwind CSS for clean, rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

    <!-- Header -->
    <header class="mb-8 text-center md:text-left">
        <h1 class="text-3xl font-bold tracking-tight text-white">Our Family Hub</h1>
        <p class="text-slate-400">Smart Grocery List & Shared Calendar</p>
    </header>

    <!-- Main Grid Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- LEFT PANEL: Smart Grocery List (Spans 5 columns) -->
        <div class="lg:col-span-5 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col justify-between">
            <div>
                <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
                    🛒 Smart Grocery List
                </h2>
                
                <!-- Quick Add Input -->
                <div class="flex gap-2 mb-6">
                    <input type="text" id="grocery-input" placeholder="Add any item (e.g., Milk, Apples, Bread)..." 
                           class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="addItem()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-4 rounded-xl transition-colors">
                        Add
                    </button>
                </div>

                <!-- Auto-Categorized Dynamic Sections -->
                <div class="space-y-4">
                    <div>
                        <h3 class="text-sm font-semibold text-emerald-400 uppercase tracking-wider mb-2">🥦 Produce</h3>
                        <div id="cat-produce" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-blue-400 uppercase tracking-wider mb-2">🥛 Dairy / Cold</h3>
                        <div id="cat-dairy" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-amber-400 uppercase tracking-wider mb-2">🍞 Bakery / Grains</h3>
                        <div id="cat-bakery" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">📦 Everything Else</h3>
                        <div id="cat-other" class="space-y-1 text-slate-300"></div>
                    </div>
                </div>
            </div>

            <!-- Clear Action -->
            <button onclick="clearChecked()" class="mt-6 w-full py-2 bg-slate-700 hover:bg-slate-650 text-slate-300 text-sm font-medium rounded-xl transition-colors">
                Clear Checked Items
            </button>
        </div>

        <!-- RIGHT PANEL: Live Apple Calendar Widget (Spans 7 columns) -->
        <div class="lg:col-span-7 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col h-[650px]">
            <h2 class="text-xl font-semibold mb-4 text-white">
                📅 Family Schedule
            </h2>
            
            <!-- Calendar Embed Window -->
            <div class="w-full flex-1 bg-slate-900 rounded-xl overflow-hidden border border-slate-700">
                <!-- 
                  REPLACE THE SRC BELOW with your generated embed code from Tockify or AddEvent.
                  Those services will turn your webcal:// link into an https:// link that works here.
                -->
                <div data-tockify-component="mini" data-tockify-calendar="jd2195"></div>
<script data-cfasync="false" data-tockify-script="embed" src="https://public.tockify.com/browser/embed.js"></script>



    <!-- Smart Categorization Script -->
    <script>
        // Simple keyword engine to sort inputs automatically
        const categories = {
            produce: ['apple', 'banana', 'lettuce', 'tomato', 'berry', 'berries', 'lemon', 'lime', 'onion', 'garlic', 'potato', 'avocado', 'salad'],
            dairy: ['milk', 'cheese', 'egg', 'eggs', 'butter', 'yogurt', 'cream', 'sour cream'],
            bakery: ['bread', 'bagel', 'tortilla', 'bun', 'buns', 'croissant', 'muffin']
        };

        function addItem() {
            const input = document.getElementById('grocery-input');
            const itemText = input.value.trim();
            if (!itemText) return;

            const lowerItem = itemText.toLowerCase();
            let targetCat = 'other';

            // Determine correct smart bucket
            if (categories.produce.some(k => lowerItem.includes(k))) targetCat = 'produce';
            else if (categories.dairy.some(k => lowerItem.includes(k))) targetCat = 'dairy';
            else if (categories.bakery.some(k => lowerItem.includes(k))) targetCat = 'bakery';

            const container = document.getElementById(`cat-${targetCat}`);
            
            // Build checkout item element
            const itemRow = document.createElement('label');
            itemRow.className = 'flex items-center gap-3 py-1.5 px-2 hover:bg-slate-750 rounded-lg cursor-pointer transition-colors group';
            itemRow.innerHTML = `
                <input type="checkbox" class="w-4 h-4 rounded border-slate-600 bg-slate-700 text-blue-600 focus:ring-blue-500 focus:ring-offset-slate-800 tracking-item">
                <span class="text-sm text-slate-300 group-hover:text-white transition-colors">${itemText}</span>
            `;

            // Setup line-through toggle behavior when checked
            const checkbox = itemRow.querySelector('input');
            checkbox.addEventListener('change', () => {
                itemRow.querySelector('span').classList.toggle('line-through', checkbox.checked);
                itemRow.querySelector('span').classList.toggle('text-slate-500', checkbox.checked);
            });

            container.appendChild(itemRow);
            input.value = '';
        }

        function clearChecked() {
            const checkedBoxes = document.querySelectorAll('input[type="checkbox"]:checked');
            checkedBoxes.forEach(box => box.closest('label').remove());
        }

        // Allow pressing "Enter" key to add items smoothly
        document.getElementById('grocery-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addItem();
        });
    </script>
</body>
</html>
