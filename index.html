<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6">

    <!-- Header -->
    <header class="mb-8 text-center md:text-left">
        <h1 class="text-3xl font-bold tracking-tight text-white">Our Family Hub</h1>
        <p class="text-slate-400">Smart Groceries & Miller Beach Packing Planner</p>
    </header>

    <!-- Main Grid Layout (Symmetrical 50/50 Split on Large Screens) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- LEFT PANEL: Smart Grocery List (Spans 6 columns) -->
        <div class="lg:col-span-6 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col justify-between min-h-[600px]">
            <div>
                <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
                    🛒 Smart Grocery List
                </h2>
                
                <!-- Grocery Quick Add Input -->
                <div class="flex gap-2 mb-6">
                    <input type="text" id="grocery-input" placeholder="Add grocery item (e.g., Milk, Apples, Bread)..." 
                           class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="window.addGroceryItem()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-4 rounded-xl transition-colors">
                        Add
                    </button>
                </div>

                <!-- Grocery Auto-Categorized Sections -->
                <div class="space-y-4">
                    <div>
                        <h3 class="text-sm font-semibold text-emerald-400 uppercase tracking-wider mb-2">🥦 Produce</h3>
                        <div id="cat-produce" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-blue-400 uppercase tracking-wider mb-2">🥛 Dairy / Cold</h3>
                        <div id="cat-dairy" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-amber-400 uppercase tracking-wider mb-2">🍞 Bakery / Grains</h3>
                        <div id="cat-bakery" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">📦 Everything Else</h3>
                        <div id="cat-grocery-other" class="space-y-1 text-slate-300"></div>
                    </div>
                </div>
            </div>

            <!-- Clear Groceries Action -->
            <button onclick="window.clearCheckedGroceries()" class="mt-6 w-full py-2.5 bg-slate-700 hover:bg-slate-650 text-slate-300 text-sm font-medium rounded-xl transition-colors">
                Clear Checked Groceries
            </button>
        </div>

        <!-- RIGHT PANEL: Miller Beach Packing List (Spans 6 columns) -->
        <div class="lg:col-span-6 bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col justify-between min-h-[600px]">
            <div>
                <h2 class="text-xl font-semibold mb-4 text-white flex items-center gap-2">
                    🏖️ Miller Beach Packing List
                </h2>
                
                <!-- Beach List Quick Add Input -->
                <div class="flex gap-2 mb-6">
                    <input type="text" id="beach-input" placeholder="Add packing item (e.g., Towels, Cooler, Sunscreen)..." 
                           class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="window.addBeachItem()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-4 rounded-xl transition-colors">
                        Add
                    </button>
                </div>

                <!-- Beach List Auto-Categorized Sections -->
                <div class="space-y-4">
                    <div>
                        <h3 class="text-sm font-semibold text-sky-400 uppercase tracking-wider mb-2">🕶️ Beach Gear</h3>
                        <div id="cat-gear" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-fuchsia-400 uppercase tracking-wider mb-2">🩲 Swim & Clothes</h3>
                        <div id="cat-clothing" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-yellow-400 uppercase tracking-wider mb-2">🍹 Food & Drinks</h3>
                        <div id="cat-food" class="space-y-1 text-slate-300"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">☀️ Sun & Safety</h3>
                        <div id="cat-beach-other" class="space-y-1 text-slate-300"></div>
                    </div>
                </div>
            </div>

            <!-- Clear Beach Action -->
            <button onclick="window.clearCheckedBeach()" class="mt-6 w-full py-2.5 bg-slate-700 hover:bg-slate-650 text-slate-300 text-sm font-medium rounded-xl transition-colors">
                Clear Checked Packing Items
            </button>
        </div>

    </div>

    <!-- Firebase System Module Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "family-hub-7d2b2.firebaseapp.com",
            databaseURL: "https://family-hub-7d2b2-default-rtdb.firebaseio.com/",
            projectId: "family-hub-7d2b2",
            storageBucket: "family-hub-7d2b2.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Setup two distinct database paths
        const groceryRef = ref(db, 'groceryList');
        const beachRef = ref(db, 'beachTripList');

        // Smart keyword definitions for auto-sorting
        const groceryCategories = {
            produce: ['apple', 'banana', 'lettuce', 'tomato', 'berry', 'berries', 'lemon', 'lime', 'onion', 'garlic', 'potato', 'avocado', 'salad'],
            dairy: ['milk', 'cheese', 'egg', 'eggs', 'butter', 'yogurt', 'cream', 'sour cream'],
            bakery: ['bread', 'bagel', 'tortilla', 'bun', 'buns', 'croissant', 'muffin']
        };

        const beachCategories = {
            gear: ['umbrella', 'chair', 'chairs', 'towel', 'towels', 'cooler', 'wagon', 'canopy', 'blanket', 'tent', 'kite', 'speaker', 'toys', 'frisbee'],
            clothing: ['swimsuit', 'swim', 'suit', 'bikini', 'trunks', 'sandals', 'flip flops', 'sunglasses', 'hat', 'hoodie', 'sweatshirt', 'shorts', 'hoodies', 'jacket'],
            food: ['snack', 'snacks', 'drink', 'water', 'ice', "s'mores", 'marshmallows', 'hot dogs', 'beer', 'wine', 'seltzer', 'juice', 'fruit', 'food']
        };

        let globalGroceries = [];
        let globalBeachItems = [];

        // ----------------- GROCERY LIST FUNCTIONALITY -----------------
        onValue(groceryRef, (snapshot) => {
            globalGroceries = snapshot.val() || [];
            renderGroceryList();
        });

        function renderGroceryList() {
            ['produce', 'dairy', 'bakery', 'grocery-other'].forEach(cat => {
                document.getElementById(`cat-${cat}`).innerHTML = '';
            });

            globalGroceries.forEach((item, index) => {
                const lowerItem = item.text.toLowerCase();
                let targetCat = 'grocery-other';

                if (groceryCategories.produce.some(k => lowerItem.includes(k))) targetCat = 'produce';
                else if (groceryCategories.dairy.some(k => lowerItem.includes(k))) targetCat = 'dairy';
                else if (groceryCategories.bakery.some(k => lowerItem.includes(k))) targetCat = 'bakery';

                const container = document.getElementById(`cat-${targetCat}`);
                const itemRow = document.createElement('label');
                itemRow.className = 'flex items-center gap-3 py-1.5 px-2 hover:bg-slate-750 rounded-lg cursor-pointer transition-colors group';
                
                itemRow.innerHTML = `
                    <input type="checkbox" ${item.checked ? 'checked' : ''} class="w-4 h-4 rounded border-slate-600 bg-slate-700 text-blue-600 focus:ring-blue-500 focus:ring-offset-slate-800">
                    <span class="text-sm ${item.checked ? 'line-through text-slate-500' : 'text-slate-300'} group-hover:text-white transition-colors">${item.text}</span>
                `;

                itemRow.querySelector('input').addEventListener('change', (e) => {
                    globalGroceries[index].checked = e.target.checked;
                    set(groceryRef, globalGroceries); 
                });

                container.appendChild(itemRow);
            });
        }

        window.addGroceryItem = function() {
            const input = document.getElementById('grocery-input');
            const itemText = input.value.trim();
            if (!itemText) return;

            globalGroceries.push({ text: itemText, checked: false });
            set(groceryRef, globalGroceries); 
            input.value = '';
        }

        window.clearCheckedGroceries = function() {
            globalGroceries = globalGroceries.filter(item => !item.checked);
            set(groceryRef, globalGroceries); 
        }


        // ----------------- MILLER BEACH TRIP FUNCTIONALITY -----------------
        onValue(beachRef, (snapshot) => {
            globalBeachItems = snapshot.val() || [];
            renderBeachList();
        });

        function renderBeachList() {
            ['gear', 'clothing', 'food', 'beach-other'].forEach(cat => {
                document.getElementById(`cat-${cat}`).innerHTML = '';
            });

            globalBeachItems.forEach((item, index) => {
                const lowerItem = item.text.toLowerCase();
                let targetCat = 'beach-other';

                if (beachCategories.gear.some(k => lowerItem.includes(k))) targetCat = 'gear';
                else if (beachCategories.clothing.some(k => lowerItem.includes(k))) targetCat = 'clothing';
                else if (beachCategories.food.some(k => lowerItem.includes(k))) targetCat = 'food';

                const container = document.getElementById(`cat-${targetCat}`);
                const itemRow = document.createElement('label');
                itemRow.className = 'flex items-center gap-3 py-1.5 px-2 hover:bg-slate-750 rounded-lg cursor-pointer transition-colors group';
                
                itemRow.innerHTML = `
                    <input type="checkbox" ${item.checked ? 'checked' : ''} class="w-4 h-4 rounded border-slate-600 bg-slate-700 text-blue-600 focus:ring-blue-500 focus:ring-offset-slate-800">
                    <span class="text-sm ${item.checked ? 'line-through text-slate-500' : 'text-slate-300'} group-hover:text-white transition-colors">${item.text}</span>
                `;

                itemRow.querySelector('input').addEventListener('change', (e) => {
                    globalBeachItems[index].checked = e.target.checked;
                    set(beachRef, globalBeachItems); 
                });

                container.appendChild(itemRow);
            });
        }

        window.addBeachItem = function() {
            const input = document.getElementById('beach-input');
            const itemText = input.value.trim();
            if (!itemText) return;

            globalBeachItems.push({ text: itemText, checked: false });
            set(beachRef, globalBeachItems); 
            input.value = '';
        }

        window.clearCheckedBeach = function() {
            globalBeachItems = globalBeachItems.filter(item => !item.checked);
            set(beachRef, globalBeachItems); 
        }


        // Global Key Interceptors (Enter Key to submit inputs)
        document.getElementById('grocery-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.addGroceryItem();
        });
        document.getElementById('beach-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.addBeachItem();
        });
    </script>
</body>
</html>
